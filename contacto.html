<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Streaming Services</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="quienessomos.html">Quiénes somos</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="content-section contacto-page">
            <h1>Contacto</h1>

            <div class="contacto-wrapper">
                <div class="formulario-card">
                    <h3>Envíanos un mensaje</h3>
                    <form action="#" method="POST">
                        <input type="text" placeholder="Tu Nombre" required>
                        <input type="email" placeholder="Tu Correo Electrónico" required>
                        <textarea placeholder="¿Cómo podemos ayudarte?" rows="5" required></textarea>
                        <button type="submit" class="btn-enviar">ENVIAR AHORA</button>
                    </form>
                </div>

                <div class="info-card">
                    <div class="datos">
                        <h3>Nuestros Datos</h3>
                        <p><i class="fas fa-phone"></i> +57 322 111 3331</p>
                        <p><i class="fas fa-envelope"></i> Carloscastro@gmail.com</p>
                    </div>
                    <div class="mapa">
                        <h3>Ubicación</h3>
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3916.6663840545343!2d-74.78323822590966!3d10.98853455524746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ef42d0025832995%3A0x6ee5ef55547f7da6!2sRiwi!5e0!3m2!1ses-419!2sco!4v1776132736088!5m2!1ses-419!2sco" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>

            <div class="volver">
                <a href="index.html"><button><i class="fas fa-arrow-left"></i> VOLVER</button></a>
            </div>
        </section>
    </main>

    <footer>
        <p>HU2</p>
    </footer>

</body>
</html>
